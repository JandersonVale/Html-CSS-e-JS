<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Lançamento de Despesas</title>
    <link rel="stylesheet" href="../css/expenses.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style></style>
  </head>
  <body>
    <div class="form-card">
      <h2>Lançamento de Despesas</h2>
      <form>
        <div class="input-group">
          <label for="pagador">Recebedor</label>
          <input
            type="text"
            id="pagador"
            name="pagador"
            placeholder="Nome do Recebedor"
          />
          <i class="fas fa-user"></i>
        </div>

        <div class="input-group">
          <label for="descricao">Descrição</label>
          <input
            type="text"
            id="descricao"
            name="descricao"
            placeholder="Descrição da despesa"
          />
          <i class="fas fa-file-alt"></i>
        </div>

        <div class="input-group">
          <label for="data">Data de Pagamento</label>
          <input type="date" id="data" name="data" />
        </div>

        <div class="input-group">
          <label for="valor">Valor</label>
          <input type="number" id="valor" name="valor" placeholder="R$ 0,00" />
          <i class="fas fa-dollar-sign"></i>
        </div>

        <div class="input-group">
          <label for="status">Status</label>
          <select id="status" name="status">
            <option value="pendente">Pendente</option>
            <option value="pago">Pago</option>
            <option value="atrasado">Atrasado</option>
          </select>
        </div>

        <button type="submit">Salvar despesa</button>
        <a href="dash.html" class="voltar">Voltar</a>
      </form>
    </div>
  </body>
</html>
