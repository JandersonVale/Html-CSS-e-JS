<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Lançamento de Despesas</title>
    <link rel="stylesheet" href="../css/expenses.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style></style>
  </head>
  <body>
    <div class="form-card">
      <h2>Lançamento de Despesas</h2>
      <form>
        <div class="input-group">
          <label for="editRecebedor">Recebedor</label>
          <input
            type="text"
            id="editRecebedor"
            name="editRecebedor"
            placeholder="Recebedor"
          />
          <i class="fas fa-user"></i>
        </div>

        <div class="input-group">
          <label for="editValorDes">Valor</label>
          <input
            type="number"
            id="editValorDes"
            name="valorDes"
            placeholder="R$ 0,00"
          />
          <i class="fas fa-dollar-sign"></i>
        </div>

        <div class="input-group">
          <label for="editDataVenc">Data Vencimento</label>
          <input type="date" id="editDataVenc" name="data-vencimento" />
        </div>

        <div class="input-group">
          <label for="editDataPag">Data Pagamento</label>
          <input type="date" id="editDataPag" name="data-pagamento" />
        </div>

        <div class="input-group">
          <label for="editCategDes">Categoria</label>
          <select id="editCategDes" name="editCategDes">
            <option value="Serviços">Serviços</option>
            <option value="Habitação">Habitação</option>
            <option value="Empréstimo">Empréstimo</option>
            <option value="Vendas">Vendas</option>
            <option value="Impostos">Impostos</option>
          </select>
        </div>
        <div class="input-group">
          <label for="editDescricaoDes">Descricao</label>
          <input
            type="text"
            id="editDescricaoDes"
            name="editDescricaoDes"
            placeholder="DescricaoDes"
          />
        </div>

        <div class="input-group">
          <label for="statusDes">Status</label>
          <select id="statusDes" name="statusDes">
            <option value="Pendente">Pendente</option>
            <option value="Pago">Pago</option>
            <option value="Atrasado">Atrasado</option>
          </select>
        </div>
        <button type="submit">Salvar Despesa</button>
        <a href="expenses-data.html" class="voltar">Voltar</a>
      </form>
    </div>
    <script src="../js/expenses.js"></script>
  </body>
</html>
