<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../css/expenses-data.css" />
    <title>Tela de Dados</title>
    <style></style>
  </head>
  <body>
    <div class="form-card">
      <h2>Gerenciamento de Despesas</h2>
      <div class="top-bar">
        <div class="search">
          <input type="text" placeholder="Pesquisar..." />
          <i class="fa fa-search"></i>
        </div>
        <div class="filter-date">
          <label for="data-inicio">Período de:</label>
          <input type="date" id="data-inicio" name="data-inicio" />
          <label for="data-fim">a:</label>
          <input type="date" id="data-fim" name="data-fim" />
        </div>
        <button onclick="window.location.href = 'expenses.html'">
          Incluir
        </button>
      </div>
      <table id="data-table">
        <thead>
          <tr>
            <th>Recebedor</th>
            <th>Valor</th>
            <th>Data Vencimento</th>
            <th>Data Pagamento</th>
            <th>Categoria</th>
            <th>Descricao</th>
            <th>Status</th>
            <th>Ação</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>
              <button class="action-btn edit-btn">Editar</button>
              <button class="action-btn delete-btn">Excluir</button>
            </td>
          </tr>
        </tbody>
      </table>
      <div class="btn-voltardash">
        <button onclick="window.location.href = 'dash.html'">Voltar</button>
      </div>
    </div>
    <!-- Modal de edição -->
    <div class="modal" id="editModal">
      <div class="modal-content">
        <h3>Editar Registro</h3>

        <label for="editRecebedor">Recebedor</label>
        <input
          type="text"
          id="editRecebedor"
          placeholder="Recebedor"
          required
        />

        <label for="editValorDes">Valor</label>
        <input
          type="number"
          id="editValorDes"
          step="0.01"
          placeholder="Valor"
          required
        />

        <label for="editDataVenc">Data Vencimento</label>
        <input type="date" id="editDataVenc" required />

        <label for="editDataPag">Data Pagamento</label>
        <input type="date" id="editDataPag" />

        <label for="editCategDes">Categoria</label>
        <select id="editCategDes" required>
          <option value="Serviços">Salário</option>
          <option value="Habitação">Benefício</option>
          <option value="Empréstimo">Empréstimo</option>
          <option value="Vendas">Vendas</option>
          <option value="Impostos">Pagamento</option>
        </select>
        <label for="editDescricaoDes">Descricao</label>
        <input
          type="text"
          id="editDescricaoDes"
          placeholder="Descricao"
          required
        />

        <label for="editStatusDes">Status</label>
        <select id="editStatusDes" required>
          <option value="Pendente">Pendente</option>
          <option value="Pago">Pago</option>
          <option value="Atrasado">Atrasado</option>
        </select>

        <button class="save-btn" type="button" onclick="salvarEdicao()">
          Salvar
        </button>
        <button class="close-btn" type="button" onclick="fecharModal()">
          Cancelar
        </button>
      </div>
    </div>

    <script src="../js/expenses-data.js"></script>
  </body>
</html>
