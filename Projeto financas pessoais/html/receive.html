<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Lançamento de Receita</title>
    <link rel="stylesheet" href="../css/receive.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style></style>
  </head>
  <body>
    <div class="form-card">
      <h2>Lançamento de Receita</h2>
      <form>
        <div class="input-group">
          <label for="editPagador">Pagador</label>
          <input
            type="text"
            id="editPagador"
            name="editPagador"
            placeholder="Pagador"
          />
          <i class="fas fa-user"></i>
        </div>

        <div class="input-group">
          <label for="editValor">Valor Recebido</label>
          <input
            type="number"
            id="editValor"
            name="valor"
            placeholder="R$ 0,00"
          />
          <i class="fas fa-dollar-sign"></i>
        </div>

        <div class="input-group">
          <label for="editDataPrev">Data Prevista</label>
          <input type="date" id="editDataPrev" name="data-vencimento" />
        </div>

        <div class="input-group">
          <label for="editDataRec">Data Recebimento</label>
          <input type="date" id="editDataRec" name="data-pagamento" />
        </div>

        <div class="input-group">
          <label for="editCateg">Categoria</label>
          <select id="editCateg" name="editCateg">
            <option value="Salário">Salário</option>
            <option value="Benefício">Benefício</option>
            <option value="Empréstimo">Empréstimo</option>
            <option value="Vendas">Vendas</option>
            <option value="Pagamento">Pagamento</option>
          </select>
        </div>
        <div class="input-group">
          <label for="editDescricao">Descricao</label>
          <input
            type="text"
            id="editDescricao"
            name="editDescricao"
            placeholder="Descricao"
          />
        </div>

        <div class="input-group">
          <label for="status">Status</label>
          <select id="status" name="status">
            <option value="Pendente">Pendente</option>
            <option value="Pago">Pago</option>
            <option value="Atrasado">Atrasado</option>
          </select>
        </div>
        <button type="submit">Salvar Receita</button>
        <a href="receive-data.html" class="voltar">Voltar</a>
      </form>
    </div>
    <script src="../js/receive.js"></script>
  </body>
</html>
