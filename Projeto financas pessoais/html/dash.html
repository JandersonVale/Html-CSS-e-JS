<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Dashboard Financeiro</title>
<link rel="stylesheet" href="../css/dash.css" />
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<!-- Conteúdo principal -->
<div class="main">

  <div class="header">
    <h1>Ola!, Janderson</h1>
  </div>

  <!-- Top bar com filtro e dropdowns -->
  <div class="top-bar">
    <div class="filter-date">
      <label for="data-inicio">Periodo de:</label>
      <input type="date" id="data-inicio" />
      <label for="data-fim">a:</label>
      <input type="date" id="data-fim" />
    </div>

    <div class="dropdowns-container">
      <div class="dropdown">
        <button class="dropdown-btn">📝Lançamentos</button>
        <div class="dropdown-content">
          <a href="receive-data.html">Receitas</a>
          <a href="expenses-data.html">Despesas</a>
        </div>
      </div>

      <div class="dropdown">
        <button class="dropdown-btn">📊Relatórios</button>
        <div class="dropdown-content">
          <a href="#">Receitas</a>
          <a href="#">Despesas</a>
          <a href="#">Geral</a>
        </div>
      </div>

            <div class="dropdown">
        <button class="dropdown-btn" onclick="window.location.href = '../index.html'">🚪Sair </button>
        <div class="dropdown-content">
          <a href="#">Receitas</a>
          <a href="#">Despesas</a>
          <a href="#">Geral</a>
        </div>
      </div>
      </div>
    </div>
  </div>

  <!-- Cards superiores -->
  <div class="top-row">
    <div class="card receitas-card">
      <h3>
        💰 Receitas
        <button
          class="toggle-saldo"
          onclick="toggleValor('receitas-valor', this)"
        >
          🔓
        </button>
      </h3>
      <p id="receitas-valor"></p>
    </div>

    <div class="card despesas-card">
      <h3>
        💸 Despesas
        <button
          class="toggle-saldo"
          onclick="toggleValor('despesas-valor', this)"
        >
          🔓
        </button>
      </h3>
      <p id="despesas-valor"></p>
    </div>

    <div class="card saldo-card">
      <h3>
        💵 Saldo
        <button
          class="toggle-saldo"
          onclick="toggleValor('saldo-valor', this)"
        >
          🔓
        </button>
      </h3>
      <p id="saldo-valor"></p>
    </div>
  </div>

  <!-- Cards do meio -->
  <div class="middle-row">
    <div class="card">
      <h3>Receitas x Despesas</h3>
      <canvas id="receitasDespesasChart"></canvas>
    </div>
    <div class="card">
      <h3>Gastos por Categoria</h3>
      <canvas id="categoriasChart"></canvas>
    </div>
  </div>

  <!-- Card inferior -->
  <div class="bottom-row">
    <div class="card">
      <h3>📑Contas a Vencer</h3>
      <div class="status-select">
        <label for="status-select">Status:</label>
        <select id="status-select">
          <option value="todos">Todos</option>
          <option value="pendente">Pendente</option>
          <option value="pago">Pago</option>
          <option value="atrasado">Atrasado</option>
        </select>
      </div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Recebedor</th>
              <th>Valor</th>
              <th>Data Vencimento</th>
              <th>Data Pagamento</th>
              <th>Categoria</th>
              <th>Descriçao</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            <tr>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<script src="../js/dash.js"></script>
</body>
</html>
